          - generic [ref=e26]:
            - paragraph [ref=e27]: "In 1985, a family in Chatham, Ontario had a simple idea: make burgers the right way. No shortcuts. No gas. Real charcoal, real flavour, and real care in every order."
            - paragraph [ref=e28]: Four decades later, that idea is still alive. The same family, the same grill, the same recipes that made Chatham Burgers a local legend. We've watched kids grow up and come back with their own families. We've become part of people's lives — and that means everything to us.
            - paragraph [ref=e29]: Charcoal grilling isn't just a technique here. It's who we are. Every patty that hits that grill gets the same attention it got on day one. That's a promise we've kept for 40 years.
