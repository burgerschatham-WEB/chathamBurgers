        - heading "OUR STORY" [level=1] [ref=e19]
        - paragraph [ref=e20]: Some restaurants come and go. We're still here — still grilling over real charcoal, still cutting our own fries, still serving the same recipes we started with in 1985. That's not stubbornness. That's pride.
